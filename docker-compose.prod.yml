# Production overrides — used with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Differences from the base file:
#  - NODE_ENV=production
#  - No bind-mounted source code (image is the artefact)
#  - Resource limits applied
#  - Always restart on failure
#  - Postgres data persisted on a named volume (already in base)

services:

  api:
    environment:
      NODE_ENV: production
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    restart: always

  postgres:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    restart: always

  redis:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
    restart: always

  nginx:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    restart: always
