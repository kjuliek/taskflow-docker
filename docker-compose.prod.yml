services:

  # ── Blue — version actuelle (reçoit le trafic) ────────────────────────────
  api-blue:
    image: ghcr.io/kjuliek/taskflow-docker:latest
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      APP_VERSION: "1.0.0-blue"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  # ── Green — nouvelle version (standby, pas de trafic) ────────────────────
  api-green:
    image: ghcr.io/kjuliek/taskflow-docker:latest
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      APP_VERSION: "2.0.0-green"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: always

  # ── Nginx — route tout le trafic vers Blue par défaut ────────────────────
  nginx:
    image: nginx:1.27-alpine3.23
    ports:
      - "80:80"
    volumes:
      - ./nginx/blue-green.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api-blue
      - api-green
    restart: always

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  db:
    image: postgres:16.8-alpine3.23
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine3.23
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    restart: always

volumes:
  pgdata:
