# Blue/Green routing
# To switch traffic: change "api-blue" to "api-green" in active_backend,
# then reload Nginx with: docker compose -f docker-compose.prod.yml exec nginx nginx -s reload

# Active environment — receives all public traffic
upstream active_backend {
    server api-blue:3000;
}

# Standby environment — reachable only via /test-standby/ for pre-switch validation
upstream standby_backend {
    server api-green:3000;
}

server {
    listen 80;

    # All traffic goes to the active environment
    location / {
        proxy_pass http://active_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Test endpoint for the standby environment before switching
    # curl http://localhost/test-standby/health
    location /test-standby/ {
        proxy_pass http://standby_backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Silence healthcheck probes from logs
    location = /health {
        proxy_pass http://active_backend;
        proxy_set_header Host $host;
        access_log off;
    }
}
