# CI/CD Pipeline — taskflow-docker
# Full pipeline (build, scan, push to GHCR, blue/green deploy)
# will be implemented in step 5.
#
# This skeleton runs unit tests on every push and pull request.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
